# Supabase local config — used by the CLI and CI/CD pipeline.
# This file is safe to commit. It contains no secrets.
# Secrets (STRIPE_SECRET_KEY etc.) are set via `supabase secrets set` or setup.sh.

[project]
# Set during `supabase link` — do not edit by hand.
# project_id = "your-project-ref"

# ── Edge Functions ────────────────────────────────────────────────────────────
[functions.create-checkout]
# verify_jwt = false so the booking page can call it without a Supabase session.
verify_jwt = false

# ── Local dev (supabase start) ────────────────────────────────────────────────
# These ports are only used when running Supabase locally for testing.
[api]
enabled  = true
port     = 54321
schemas  = ["public"]

[db]
port         = 54322
shadow_port  = 54320
major_version = 15

[studio]
enabled = true
port    = 54323

[storage]
enabled = false   # not used by this project

[auth]
enabled = false   # not used by this project
